databases:
  - name: insight-hub-db
    databaseName: insight_hub
    user: insight_hub
    plan: free

services:
  - type: web
    name: occu-med-insight-hub
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/occu-med-insight-hub run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: insight-hub-db
          property: connectionString
      # --- Third-party API keys (set values in Render dashboard, never in code) ---
      - key: APIFY_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: LANGSEARCH_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OLOSTEP_API_KEY
        sync: false
      - key: YOU_API_KEY
        sync: false
