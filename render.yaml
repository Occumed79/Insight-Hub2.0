databases:
  - name: insight-hub-db
    databaseName: insight_hub
    user: insight_hub
    plan: free

services:
  - type: web
    name: occu-med-insight-hub
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/occu-med-insight-hub run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: insight-hub-db
          property: connectionString
